<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Buddhalens</title>
    <link rel="stylesheet" href="/src/assets/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            height: calc(100vh - 80px);
        }

        .sidebar {
            background: white;
            border-right: 1px solid #e5e7eb;
            padding-right: 2rem;
            overflow-y: auto;
        }

        .main-content {
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            position: relative;
            overflow: hidden;
        }

        #graph-container {
            width: 100%;
            height: 100%;
        }

        .node circle {
            stroke: #fff;
            stroke-width: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .node text {
            font-size: 12px;
            pointer-events: none;
            text-shadow: 1px 1px 2px white;
        }

        .link {
            stroke: #999;
            stroke-opacity: 0.6;
            stroke-width: 1.5px;
        }

        .received-node circle {
            fill: #eab308 !important;
            /* Gold */
            stroke: #ca8a04 !important;
        }

        .received-link {
            stroke: #eab308 !important;
            stroke-width: 2px !important;
            stroke-opacity: 1 !important;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo"><a href="index.html" style="color: white; text-decoration: none;">Buddhalens</a></div>
        <div style="color: white;">
            <span id="user-email" style="margin-right: 1rem;"></span>
            <a href="#" id="logout-btn" style="color: white; font-size: 0.9rem;">Log Out</a>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="dashboard-header">
                <h3>My Lineage</h3>
            </div>
            <p style="font-size: 0.9rem; color: #6b7280; margin-bottom: 1rem;">
                Check the box to mark a transmission as received. The graph will update to show your path.
            </p>
            <ul class="lineage-list" id="lineage-list">
                <!-- List items will be populated by JS -->
            </ul>
        </aside>

        <main class="main-content">
            <div id="graph-container"></div>
        </main>
    </div>

    <script type="module" src="/src/js/dashboard.js"></script>
</body>

</html>

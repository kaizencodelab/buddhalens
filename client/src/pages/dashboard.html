<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Buddhalens</title>
    <link rel="stylesheet" href="../assets/styles/main.css">
    <style>
        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .lineage-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .lineage-item label {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            cursor: pointer;
        }

        .lineage-item input[type="checkbox"] {
            margin-top: 3px;
            flex-shrink: 0;
        }

        .lineage-text {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .lineage-name {
            font-weight: 500;
        }

        .lineage-item.received .lineage-name {
            color: #ca8a04;
        }

        .lineage-meta {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .lineage-transmission {
            font-size: 0.75rem;
            color: #9ca3af;
            font-style: italic;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo"><a href="/client/index.html">Buddhalens</a></div>
        <div class="nav-links">
            <a href="">About</a>
            <a href="">Support Us</a>
            <a href="#" id="logout-btn">Log Out</a>
        </div>
    </header>

    <div class="dashboard-container">
        <h3>Welcome, <span id="user-email"></span></h3>
        <ul class="lineage-list" id="lineage-list"></ul>
    </div>

    <script type="module" src="./dashboard.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Buddhalens</title>
    <link rel="stylesheet" href="/src/assets/style.css">
</head>

<body>
    <header>
        <div class="logo"><a href="index.html" style="color: white; text-decoration: none;">Buddhalens</a></div>
    </header>

    <div class="auth-form">
        <h2 style="text-align: center; margin-bottom: 2rem;">Log In</h2>

        <button id="google-login-btn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
            <span>Sign in with Google</span>
        </button>

        <div class="divider">
            <span>OR</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="********">
            </div>
            <button type="submit" class="submit-btn">Log In</button>
        </form>
    </div>

    <script type="module" src="/src/js/login.js"></script>
</body>

</html>
